name: "Update Korean TV M3U Playlist"

on:
  schedule:
    - cron: '0 19 * * *'  # 每天UTC时间19:00运行，对应中国时间次日03:00
  workflow_dispatch:
  push:
    paths:
      - 'update_playlist.py'

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Chrome browser
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests selenium beautifulsoup4 webdriver-manager

    - name: Run update script
      env:
        FULL_ACCESS_TOKEN: ${{ secrets.FULL_ACCESS_TOKEN }}
      run: |
        python update_playlist.py || exit 1

    - name: Commit and push to GitHub and Gitee
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        
        # 使用 GITHUB_TOKEN 设置 GitHub 远程 URL
        git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
        
        echo "🔄 同步远程仓库..."
        git pull origin main --rebase --autostash
        
        # 检查是否有更改
        if git diff --quiet && git diff --staged --quiet; then
          echo "📝 没有检测到文件变更，跳过提交"
          exit 0
        fi
        
        # 提交更改
        echo "💾 提交更改..."
        git add -A
        git commit -m "Auto-update playlist - $(date +'%Y-%m-%d %H:%M:%S')"
        
        # 1. 推送更改到 GitHub
        echo "🚀 推送到 GitHub..."
        git push origin main
        
        # 2. 推送更改到 Gitee
        echo "🚀 推送到 Gitee..."
        GITEE_REPO="korean-tv-static" 
        REMOTE_URL="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_USERNAME}/${GITEE_REPO}.git"
        git remote add gitee "${REMOTE_URL}"
        git push gitee main --force
        
        echo "✅ 变更已成功同步到 GitHub 和 Gitee 平台"

    - name: Upload playlist as artifact
      uses: actions/upload-artifact@v4
      with:
        name: korean-tv-playlist
        path: korean_tv.m3u
        retention-days: 7
